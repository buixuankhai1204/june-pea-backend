version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: june_pea_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: june_pea_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache
  redis:
    image: redis:7-alpine
    container_name: june_pea_redis
    ports:
      - "6379:6379"

  # Rust API Gateway
  app:
    build: .
    container_name: june_pea_api
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/june_pea_ecommerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_super_secret_key_june_pea_2024
      RUST_LOG: info
    restart: always

volumes:
  postgres_data: